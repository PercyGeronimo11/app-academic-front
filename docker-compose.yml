version: '3.8'

services:
  vue-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "88:80"  # Mapea el puerto 88 del VPS al puerto 80 del contenedor Nginx
    image: app-tesis-front:vue3
    environment:
      - VITE_API_URL=http://161.132.40.114:89/api
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
